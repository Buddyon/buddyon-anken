name: Sync Wix CMS to data.json

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Wix CMS data
        run: |
          RESPONSE=$(curl -s \
            -X POST \
            -H "Authorization: IST.eyJraWQiOiJQb3pIX2FDMiIsImFsZyI6IlJTMjU2In0..WuHUdLjyOlGCXYvemyOcStcr-HwhXnlFU1Lk_Ykqz1OIWpxpyqppJlr_sNUeEFwsdTNKQ7ANsqKdzY3PWQlRHmh_5eNnOiHsehjOaFgjUdjQrvoSn1qc6SvOCQfqSNkLOKKIccpHJ3qbXBDvCNtsHiwKi_nQpEI4rTgERF5S2rRmzibaLpZjkKe3fC4lC5ILaF4pSxTYLLZQt3J6iYKbbyipUpyZDQ14WlOKqksdj9a5kIThNv808g4yDywOHkRMul3wWWNmSLN3Skc4YChIoCVDlexlbn1qSURGpytlvLmFTpkUu_WgxoBLoqKuK8lqIKkv4yuwL4AG8N_ppdyD9A" \
            -H "wix-site-id: 19c4a8ac-36ed-410f-94f1-978ab08b87b1" \
            -H "Content-Type: application/json" \
            -d '{"dataCollectionId":"AnkenList","query":{"paging":{"limit":100}}}' \
            "https://www.wixapis.com/wix-data/v2/items/query")

          if echo "$RESPONSE" | grep -q '"dataItems"'; then
            echo "$RESPONSE" > data.json
            COUNT=$(echo "$RESPONSE" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(len(d["dataItems"]))' 2>/dev/null || echo "?")
            echo "✅ 取得成功: ${COUNT}件"
          else
            echo "❌ APIエラー。既存のdata.jsonを保持します。"
            echo "Response: $RESPONSE"
            exit 0
          fi

      - name: Commit and push if changed
        run: |
          git config user.email "github-actions@buddyon.net"
          git config user.name "GitHub Actions"
          git add data.json
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "Sync: Wix CMS $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
